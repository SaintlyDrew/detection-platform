name: CI

on:
  push:
  pull_request:

# Least privilege: this workflow only reads the repo to run tests.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Tests
        run: python -m pytest -q
